<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Swahili Treats – Admin Login</title>

  <!-- ── PWA metadata ───────────────────────────────────────────────── -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ff006e" />
  <meta name="description" content="Sign in to the Swahili Treats admin dashboard." />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS Safari "Add to Home Screen" support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ST Admin" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #ffb703;
      --secondary: #fb8500;
      --accent: #219ebc;
      --bg: linear-gradient(135deg, #fffbea 0%, #ffe5ec 100%);
      --button: #ff006e;
      --button-hover: #d9045b;
      --text: #22223b;
      --error-bg: #fff0f3;
      --error-border: #ff006e;
      --error-text: #c0004b;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Quicksand', Arial, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating decorative emojis */
    .floating-emoji {
      position: fixed;
      font-size: 2.2rem;
      opacity: 0.35;
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .e1 { left: 8vw;  top: 12vh; animation-delay: 0s; }
    .e2 { right: 10vw; top: 18vh; animation-delay: 2s; }
    .e3 { left: 15vw; bottom: 14vh; animation-delay: 1s; }
    .e4 { right: 14vw; bottom: 10vh; animation-delay: 3s; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-22px); }
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(34,34,59,0.10);
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      animation: cardIn 0.6s both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(30px) scale(0.97); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }

    /* Logo */
    .logo {
      font-family: 'Fredoka', cursive;
      font-size: 2.2rem;
      color: var(--button);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      text-align: center;
      font-size: 0.92rem;
      color: #888;
      font-weight: 600;
      margin-bottom: 1.8rem;
      letter-spacing: 0.5px;
    }

    /* Form */
    .field {
      margin-bottom: 1.1rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
      letter-spacing: 0.3px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33,158,188,0.12);
    }

    /* Password wrapper (show/hide toggle) */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 3rem;
    }
    .pw-toggle {
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      line-height: 1;
      color: #aaa;
    }
    .pw-toggle:hover { color: var(--accent); }

    /* Error box */
    .error-box {
      display: none;
      align-items: flex-start;
      gap: 0.6rem;
      background: var(--error-bg);
      border: 1.5px solid var(--error-border);
      border-radius: 0.9rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.1rem;
      font-size: 0.9rem;
      color: var(--error-text);
      font-weight: 600;
      animation: shake 0.35s both;
    }
    .error-box.visible { display: flex; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .error-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    /* Submit button */
    .login-btn {
      width: 100%;
      background: var(--button);
      color: #fff;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      margin-top: 0.4rem;
      letter-spacing: 0.3px;
    }
    .login-btn:hover:not(:disabled) {
      background: var(--button-hover);
      transform: scale(1.02);
    }
    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: #bbb;
      margin-top: 1.5rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.2rem 1.5rem;
        border-radius: 1.5rem;
      }
      .logo { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="floating-emoji e1">🍬</div>
  <div class="floating-emoji e2">🍭</div>
  <div class="floating-emoji e3">🥭</div>
  <div class="floating-emoji e4">🥥</div>

  <div class="card">
    <div class="logo">🍬 Swahili Treats</div>
    <div class="subtitle">Admin Dashboard — Sign In</div>

    <div class="error-box" id="error-box" role="alert">
      <span class="error-icon">⚠️</span>
      <span id="error-msg">Invalid email or password.</span>
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        autocomplete="email"
        placeholder="admin@example.com"
        required
      />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
        <button class="pw-toggle" type="button" id="pw-toggle" aria-label="Toggle password visibility">👁️</button>
      </div>
    </div>

    <button class="login-btn" id="login-btn" type="button">Sign In</button>

    <div class="footer-note">Access restricted to authorised admins only.</div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Supabase config (same credentials as admin.html) ──────────────
    const SUPABASE_URL  = "https://hamqmvjucrvsjhqfsehe.supabase.co";
    const SUPABASE_ANON = "sb_publishable_8g8mp-PH2uvpPR4RbTmGsg_kdXw9fXb";
    const { createClient } = supabase;
    const auth = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── If already logged in, go straight to the dashboard ────────────
    (async () => {
      const { data: { session } } = await auth.auth.getSession();
      if (session) window.location.replace("admin.html");
    })();

    // ── DOM refs ──────────────────────────────────────────────────────
    const emailEl   = document.getElementById("email");
    const passwordEl= document.getElementById("password");
    const loginBtn  = document.getElementById("login-btn");
    const errorBox  = document.getElementById("error-box");
    const errorMsg  = document.getElementById("error-msg");
    const pwToggle  = document.getElementById("pw-toggle");

    // ── Show/hide password ────────────────────────────────────────────
    pwToggle.addEventListener("click", () => {
      const isHidden = passwordEl.type === "password";
      passwordEl.type = isHidden ? "text" : "password";
      pwToggle.textContent = isHidden ? "🙈" : "👁️";
    });

    // ── Show error helper ─────────────────────────────────────────────
    function showError(msg) {
      errorMsg.textContent = msg;
      // Re-trigger shake animation
      errorBox.classList.remove("visible");
      void errorBox.offsetWidth; // reflow
      errorBox.classList.add("visible");
    }

    // ── Login handler ─────────────────────────────────────────────────
    async function doLogin() {
      const email    = emailEl.value.trim();
      const password = passwordEl.value;

      // Basic validation
      if (!email) { showError("Please enter your email address."); emailEl.focus(); return; }
      if (!password) { showError("Please enter your password."); passwordEl.focus(); return; }

      // Loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>Signing in…';
      errorBox.classList.remove("visible");

      const { error } = await auth.auth.signInWithPassword({ email, password });

      if (error) {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";

        // Map Supabase error messages to user-friendly ones
        const msg = error.message || "";
        if (msg.toLowerCase().includes("invalid login") || msg.toLowerCase().includes("invalid credentials") || msg.toLowerCase().includes("email not confirmed")) {
          showError("Incorrect email or password. Please try again.");
        } else if (msg.toLowerCase().includes("too many")) {
          showError("Too many login attempts. Please wait a moment and try again.");
        } else if (msg.toLowerCase().includes("network") || msg.toLowerCase().includes("fetch")) {
          showError("Network error — check your connection and try again.");
        } else {
          showError(msg || "Login failed. Please try again.");
        }
        return;
      }

      // Success — redirect to admin dashboard
      window.location.replace("admin.html");
    }

    // ── Click & Enter key triggers ─────────────────────────────────────
    loginBtn.addEventListener("click", doLogin);
    [emailEl, passwordEl].forEach(el => {
      el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    });
  </script>

  <!-- ── PWA: register service worker ────────────────────────────────────── -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/admin-sw.js", { scope: "/" })
          .catch(err => console.error("Service worker registration failed:", err));
      });
    }
  </script>
</body>
</html>
